<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥃 The Hangover Part 87：邱邱與他的義父們</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'vn-red': '#DA251D', 
                        'grab-green': '#00B14F',  
                        'gold': '#FFD700',
                        'saigon-night': '#1E293B',
                        'wedding-pink': '#FF758C'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; padding-bottom: 80px;}
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(0,0,0,0.05); }
        .hangover-gradient { background: linear-gradient(135deg, #DA251D 0%, #1E293B 100%); }
        .wedding-mode { border: 2px solid #FF758C; background-color: #FFF5F7; }
        /* 自定義捲軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 antialiased">

<div class="app-container" id="app">
    <header class="sticky top-0 z-50 hangover-gradient text-white px-4 py-4 shadow-lg">
        <div class="flex justify-between items-center">
            <div class="flex-1">
                <h1 class="text-lg font-bold tracking-tight leading-tight">
                    🥃 The Hangover Part 87
                </h1>
                <p class="text-[11px] text-gold font-medium tracking-tighter mt-0.5 opacity-90">
                    邱邱與他的義父們 | 🇻🇳 伴郎團執行手冊
                </p>
            </div>
            <div class="text-right ml-2">
                <div class="text-[10px] font-medium bg-white/20 backdrop-blur px-2 py-1 rounded-full whitespace-nowrap border border-white/30">
                    <i class="fas fa-ring mr-1"></i> <span>Wedding Day</span>
                </div>
            </div>
        </div>
    </header>

    <main class="p-4 space-y-6" id="main-content"></main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 glass-nav max-w-[480px] mx-auto pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <div class="flex justify-around items-center h-16">
            <button onclick="renderItinerary()" class="nav-btn flex flex-col items-center justify-center w-1/5 h-full text-vn-red font-bold">
                <i class="fas fa-calendar-alt text-lg mb-1"></i><span class="text-[8px]">任務時程</span>
            </button>
            <button onclick="renderSeats()" class="nav-btn flex flex-col items-center justify-center w-1/5 h-full text-gray-400">
                <i class="fas fa-chair text-lg mb-1"></i><span class="text-[8px]">晚宴座位</span>
            </button>
            <button onclick="renderInfo()" class="nav-btn flex flex-col items-center justify-center w-1/5 h-full text-gray-400">
                <i class="fas fa-map-marker-alt text-lg mb-1"></i><span class="text-[8px]">重要地點</span>
            </button>
            <button onclick="renderGuide()" class="nav-btn flex flex-col items-center justify-center w-1/5 h-full text-gray-400">
                <i class="fas fa-utensils text-lg mb-1"></i><span class="text-[8px]">注意事項</span>
            </button>
            <button onclick="renderLuggage()" class="nav-btn flex flex-col items-center justify-center w-1/5 h-full text-gray-400">
                <i class="fas fa-list-ul text-lg mb-1"></i><span class="text-[8px]">物品清單</span>
            </button>
        </div>
    </nav>
</div>

<script>

                    { time: "20:00", type: "food", title: "Phở Lệ (麗錦河粉)", desc: "西貢最強牛肉河粉，開啟味蕾之旅。", nav: "https://www.google.com/maps/search/Pho+Le+District+5" }
                ]
            },
            {
                date: "03/19 (四)", loc: "法式風情與咖啡公寓",

                    { time: "14:30", type: "spot", title: "咖啡公寓 (The Cafe Apartment)", desc: "文青聖地，大推 % Arabica 或眺望街景。", nav: "https://www.google.com/maps/search/The+Cafe+Apartment" }

                    { time: "17:30", type: "transport", title: "前往 The Myst", desc: "交通半小時，準備參與盛大晚宴。", nav: "https://www.google.com/maps/search/The+Myst+Dong+Khoi" },
                    { time: "18:30", type: "wedding", title: "晚宴正式開始 (The Myst)", desc: "開喝時刻！邱邱與義父們的慶祝高峰。", nav: "" },
                    { time: "21:30", type: "free", title: "自由活動 / After Party", desc: "西貢夜晚才剛開始，酒水續杯。", nav: "" }
                ]

                    { time: "20:00", type: "drink", title: "Chill Skybar", desc: "俯瞰西貢夜景，總結這場傳奇旅程。", nav: "https://www.google.com/maps/search/Chill+Skybar" }

                ]
            }
        ],
        // 座位表資料 (根據 CSV 整理)
        seating: [
            {

                guests: [
                    "1 Mr. Hải", "2 Mr. Thái Đạt", "3 Mr. Khiết", "4 Mr. Trung", "5 Mr. Duy", 
                    "6 Ms. Meily Mia", "7 Mr. Trung Hậu", "8 Mr. Ste Phạm", "9 Ms. Hà Anh", "10 Ms. Hoa",

                    "16 Ms. Thanh Nhi", "17 Ms. Nguyệt Quế", "18 Mr. Duy Luân", "19 Mr. Mohamad Thắng", "20 Ms. My"
                ]
            },
            {
                tableName: "TABLE 2",
                guests: [
                    "21 Mr. Trường Thiên", "22 Ms. Thanh Tuyền", "23 Ms. Jenny Nguyen", "25 Ms. Quỳnh Trang", "26 Mr. Duy Mỹ",
                    "27 Mr. Viết Duy", "28 Mr. Mint Nguyễn", "29 Ms. Hoàng Trinh", "30 Ms. Ngọc Ánh", "31 Ms. Thu Thảo",

                    "37 Ms. Phượng", "38 Ms. Phúc", "39 Ms. Kim Yến", "40 Mr. Anh Tú", "41 Ms. Thúy Hiền",
                    "42 Ms. Đan Thanh", "43 Mr. Quốc Minh", "44 Mr. Lê Hiệp", "45 Mr. Hà Vũ Quang", "46 Mr. Mai Huy",
                    "47 Ms. Nhi Phan", "48 Ms. Thanh Hằng", "49 Ms. Tuyết Hương", "50 Ms. Thiên Hương"
                ]
            },
            {
                tableName: "女方親友桌 (Family)",
                guests: [
                    "51 Ms. Ngọc Thanh (Mẹ cô dâu)", "52 Ms. Ngọc Bích (dì Tư)", "53 Ms. Ngọc Hạnh (dì Năm)", 
                    "54 Mr. Tánh ( cậu Hai)", "55 Mr. Tánh (cậu Ba)", "56 Ms. Xuân", "57 Ms. Trọng", 
                    "58 Ms. Cúc", "59 Mr. Truyền", "60 Ms. Mai", "61 Ms. Ngọc Hà", 
                    "62 Ms. Nguyệt (Bà Ngoại)", "63 Ms. Ngọc Thảo (dì)", "64 Mr. Quốc"
                ]
            },
            {
                tableName: "男方親友桌 (Groom)",
                guests: [
                    "66 Mr. 邱世忠 (Ba chú rể)", "67 Ms. 邱 (媽媽)", "68 Mr. 邱 (新郎)"
                ]
            }
        ],
        info: {
            hotels: [
                { name: "Holiday Inn & Suites Saigon Airport", addr: "18E Cong Hoa Street, Ward 4, Tan Binh", note: "3/21 迎娶基地", nav: "https://www.google.com/maps/search/Holiday+Inn+Saigon+Airport" },
                { name: "The Myst Dong Khoi", addr: "6-8 Ho Huan Nghiep, Ben Nghe, District 1", note: "3/21 晚宴場地", nav: "https://www.google.com/maps/search/The+Myst+Dong+Khoi" }
            ],
            flight: "✈️ 去：CI 783 (14:10) | ✈️ 回：CI 782 (11:00)"
        },
        guide: {
            essentials: [
                { title: "🚗 交通建議", val: "當天轉場多，請預留 Grab 叫車時間，建議提前 10 分鐘預約。" },
                { title: "👔 婚禮服裝", val: "三月西貢悶熱，室外儀式會流汗，記得隨身帶小手帕與止汗劑。" },
                { title: "📱 聯絡通訊", val: "確保 Zalo/Line 群組通知開啟，方便義父團即時溝通。" }
            ]
        },
        luggage: [
            { category: "婚禮必備", items: ["帥就完事了", "紅包袋", "行動電源 (拍影片用)"] },
            { category: "日常用品", items: ["腸胃藥", "防曬油", "墨鏡", "換匯美金/台幣"] }
        ]
    };

    function updateNav(idx) {
        document.querySelectorAll('.nav-btn').forEach((btn, i) => {
            btn.className = i === idx ? "nav-btn flex flex-col items-center justify-center w-1/5 h-full text-vn-red font-bold" : "nav-btn flex flex-col items-center justify-center w-1/5 h-full text-gray-400";
        });
    }

    function renderItinerary() {
        updateNav(0);
        const container = document.getElementById('main-content');
        container.innerHTML = tripData.days.map(day => `
            <div class="rounded-xl shadow-sm border ${day.isWedding ? 'wedding-mode' : 'bg-white border-slate-100'} overflow-hidden mb-6">
                <div class="${day.isWedding ? 'bg-wedding-pink text-white' : 'bg-slate-800 text-white'} px-4 py-2 flex justify-between items-center">
                    <h2 class="font-bold text-sm">${day.date} | ${day.loc}</h2>
                </div>
                <div class="p-2">
                    ${day.events.map(e => `
                        <div class="relative pl-6 py-3 border-l border-slate-100 ml-4">
                            <div class="absolute -left-1.5 top-5 w-3 h-3 rounded-full bg-white border-2 ${day.isWedding ? 'border-wedding-pink' : 'border-vn-red'}"></div>
                            <div class="flex justify-between items-start text-sm">
                                <div class="flex-1">
                                    <span class="text-[10px] text-slate-400 font-mono">${e.time || ''}</span>
                                    <h3 class="font-bold block text-slate-800">${e.title}</h3>
                                    <p class="text-[11px] text-slate-500 mt-1">${e.desc}</p>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    // 新增：渲染座位表 (直式)
    function renderSeats() {
        updateNav(1);
        const container = document.getElementById('main-content');
        container.innerHTML = `
            <div class="mb-4">
                <h3 class="text-lg font-bold text-vn-red mb-2"><i class="fas fa-chair mr-2"></i> 晚宴座位查詢</h3>
                <p class="text-xs text-slate-400">點擊下方桌次查看名單，依據編號入座。</p>
            </div>
            <div class="space-y-4">
                ${tripData.seating.map(table => `
                    <div class="bg-white rounded-xl shadow-sm border border-pink-100 overflow-hidden">
                        <div class="bg-pink-50 px-4 py-3 border-b border-pink-100 flex justify-between items-center">
                            <span class="font-bold text-wedding-pink text-sm tracking-widest">${table.tableName}</span>
                            <span class="text-[10px] bg-white text-pink-400 px-2 py-0.5 rounded-full border border-pink-100">
                                ${table.guests.length} 人
                            </span>
                        </div>
                        <div class="p-3">
                            <div class="grid grid-cols-1 gap-1">
                                ${table.guests.map(name => `
                                    <div class="flex items-center py-2 px-3 hover:bg-slate-50 rounded-lg border-b border-slate-50 last:border-0">
                                        <i class="fas fa-user-circle text-slate-300 mr-3"></i>
                                        <span class="text-xs text-slate-700 font-medium">${name}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
            <div class="mt-8 p-4 bg-slate-100 rounded-lg text-center">
                <p class="text-[10px] text-slate-400 italic">如有座位問題，請即刻聯繫伴郎團義父。</p>
            </div>
        `;
    }

    function renderInfo() {
        updateNav(2);
        const container = document.getElementById('main-content');
        container.innerHTML = `
            <div class="space-y-6">
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="font-bold border-b pb-2 mb-4 text-vn-red flex items-center"><i class="fas fa-map-marker-alt mr-2"></i> 晚宴場地</h3>
                    <div class="text-xs">
                        <div class="font-bold text-sm text-slate-800">${tripData.info.hotels[0].name}</div>
                        <div class="text-wedding-pink font-bold italic mt-2">📍 ${tripData.info.hotels[0].note}</div>
                        <a href="${tripData.info.hotels[0].nav}" target="_blank" class="block mt-4 text-center bg-vn-red text-white py-2 rounded-lg font-bold">開啟 Google Maps</a>
                    </div>
                </div>
            </div>`;
    }

    function renderGuide() {
        updateNav(3);
        const container = document.getElementById('main-content');
        container.innerHTML = `<div class="p-5 bg-white rounded-xl border border-slate-100"><h3 class="font-bold text-vn-red mb-4">注意事項</h3>${tripData.guide.essentials.map(t => `<div class="mb-4"><div class="text-[11px] font-bold text-slate-700 border-l-4 border-gold pl-2">${t.title}</div><div class="text-xs text-slate-500 mt-2">${t.val}</div></div>`).join('')}</div>`;
    }

    function renderLuggage() {
        updateNav(4);
        const container = document.getElementById('main-content');
        container.innerHTML = `<div class="space-y-4">${tripData.luggage.map(cat => `<div class="bg-white p-5 rounded-xl border border-slate-100"><h3 class="font-bold text-vn-red text-sm mb-3">${cat.category}</h3><div class="grid grid-cols-2 gap-3">${cat.items.map(item => `<label class="flex items-center space-x-2 text-xs text-slate-600"><input type="checkbox" class="rounded border-gray-300 text-vn-red"><span>${item}</span></label>`).join('')}</div></div>`).join('')}</div>`;
    }

    document.addEventListener('DOMContentLoaded', renderItinerary);
</script>
</body>
</html>
