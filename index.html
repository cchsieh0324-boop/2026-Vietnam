<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥃 The Hangover Part 87：邱邱與他的義父們</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'vn-red': '#DA251D', 
                        'grab-green': '#00B14F',  
                        'gold': '#FFD700',
                        'saigon-night': '#1E293B',
                        'wedding-pink': '#FF758C'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; padding-bottom: 80px;}
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(0,0,0,0.05); }
        .hangover-gradient { background: linear-gradient(135deg, #DA251D 0%, #1E293B 100%); }
        .wedding-mode { border: 2px solid #FF758C; background-color: #FFF5F7; }
        .pro-tip { border-left: 3px solid #FFD700; background: #FFFDF0; padding: 8px 12px; border-radius: 4px; margin-top: 8px; font-size: 11px; color: #856404; }
    </style>
</head>
<body class="text-slate-800 antialiased">

<div class="app-container" id="app">
    <header class="sticky top-0 z-50 hangover-gradient text-white px-4 py-4 shadow-lg">
        <div class="flex justify-between items-center">
            <div class="flex-1">
                <h1 class="text-lg font-bold tracking-tight leading-tight">
                    🥃 The Hangover Part 87
                </h1>
                <p class="text-[11px] text-gold font-medium tracking-tighter mt-0.5 opacity-90">
                    邱邱與他的義父們 | 🇻🇳 伴郎團執行手冊
                </p>
            </div>
            <div class="text-right ml-2">
                <div class="text-[10px] font-medium bg-white/20 backdrop-blur px-2 py-1 rounded-full whitespace-nowrap border border-white/30">
                    <i class="fas fa-ring mr-1"></i> <span>Wedding Trip</span>
                </div>
            </div>
        </div>
    </header>

    <main class="p-4 space-y-6" id="main-content"></main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 glass-nav max-w-[480px] mx-auto pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <div class="flex justify-around items-center h-16">
            <button onclick="renderItinerary()" class="nav-btn flex flex-col items-center justify-center w-1/4 h-full text-vn-red font-bold">
                <i class="fas fa-map-marked-alt text-lg mb-1"></i><span class="text-[9px]">任務時程</span>
            </button>
            <button onclick="renderInfo()" class="nav-btn flex flex-col items-center justify-center w-1/4 h-full text-gray-400">
                <i class="fas fa-building text-lg mb-1"></i><span class="text-[9px]">重要地點</span>
            </button>
            <button onclick="renderGuide()" class="nav-btn flex flex-col items-center justify-center w-1/4 h-full text-gray-400">
                <i class="fas fa-utensils text-lg mb-1"></i><span class="text-[9px]">生存注意事項</span>
            </button>
            <button onclick="renderLuggage()" class="nav-btn flex flex-col items-center justify-center w-1/4 h-full text-gray-400">
                <i class="fas fa-suitcase text-lg mb-1"></i><span class="text-[9px]">物品清單</span>
            </button>
        </div>
    </nav>
</div>

<script>
    const tripData = {
        days: [
            {
                date: "03/18 (三)", loc: "西貢降臨：首航與牛肉河粉",
                weather: { icon: "fa-sun", temp: "26-35°C" },
                events: [
                    { time: "14:10", type: "flight", title: "桃園 T1 啟程 (CI 783)", desc: "預計 17:00 抵達新山機場。", nav: "https://www.google.com/maps/search/?api=1&query=Tan+Son+Nhat+International+Airport" },
                    { time: "18:30", type: "transport", title: "Grab 前往飯店入住", desc: "前往第一郡 The Myst Dong Khoi 辦理 Check-in。", nav: "https://www.google.com/maps/search/?api=1&query=The+Myst+Dong+Khoi" },
                    { time: "20:00", type: "food", title: "Phở Lệ (麗錦河粉)", desc: "西貢南越河粉天花板。必點：全配牛肉粉 + 一杯生乳冰咖啡。", nav: "https://www.google.com/maps/search/?api=1&query=Pho+Le+District+5" }
                ]
            },
            {
                date: "03/19 (四) ", loc: "法式優雅與咖啡公寓探索",
                weather: { icon: "fa-sun", temp: "25-36°C" },
                events: [
                    { time: "10:00", type: "food", title: "Bánh Mì Huỳnh Hoa", desc: "傳說中的最強法國麵包。這家料多到要兩人共享。", nav: "https://www.google.com/maps/search/?api=1&query=Banh+Mi+Huynh+Hoa" },
                    { time: "11:30", type: "spot", title: "西貢聖母大教堂 / 郵局", desc: "經典地標拍照。", nav: "https://www.google.com/maps/search/?api=1&query=Saigon+Central+Post+Office" },
                    { time: "14:30", type: "spot", title: "咖啡公寓 (The Cafe Apartment)", desc: "推薦搭電梯到頂樓。必喝：特有的鹽咖啡 (Salt Coffee)。", nav: "https://www.google.com/maps/search/?api=1&query=The+Cafe+Apartment+Saigon" },
                    { time: "19:00", type: "food", title: "Pizza 4P's Ben Thanh", desc: "必點：布拉塔起司火腿披薩。", nav: "https://www.google.com/maps/search/?api=1&query=Pizza+4P's+Ben+Thanh" }
                ]
            },
            {
                date: "03/20 (五)", loc: "粉紅夢幻與婚前桑拿放鬆",
                weather: { icon: "fa-cloud-sun", temp: "26-35°C" },
                events: [
                    { time: "10:30", type: "spot", title: "耶穌聖心堂 (粉紅教堂)", desc: "視覺衝擊最強的地標。拍完照去對面喝椰奶咖啡冰沙。", nav: "https://www.google.com/maps/search/?api=1&query=Tan+Dinh+Church" },
                    { time: "15:30", type: "spa", title: "Miu Miu Spa 桑拿", desc: "專業越式按摩，為明天的任務儲備體力。", nav: "https://www.google.com/maps/search/?api=1&query=Miu+Miu+Spa+Saigon" }
                ]
            },
            {
                date: "03/21 (六)", loc: "✨ 核心任務：Wedding Day ✨",
                isWedding: true,
                weather: { icon: "fa-sun", temp: "25-36°C" },
                events: [
                    { time: "06:00", type: "transport", title: "移防至 Holiday Inn 早餐", desc: "全員集合。今日移入 Holiday Inn 迎娶基地。", nav: "https://www.google.com/maps/search/?api=1&query=Holiday+Inn+Suites+Saigon+Airport" },
                    { time: "09:00", type: "wedding", title: "義父團集合/拍照錄影", desc: "於 Holiday Inn 拍攝伴郎團花絮。" },
                    { time: "10:00", type: "transport", title: "前往 Vy 家", desc: "交通約半小時。" },
                    { time: "11:00", type: "wedding", title: "迎娶儀式 (Vy 家)", desc: "重頭戲開始！保持帥度與專注。" },
                    { time: "13:00", type: "wedding", title: "拍照攝影時間", desc: "帥就完事了" }, 
                    { time: "13:30", type: "transport", title: "返回Holiday Inn", desc: "自由活動到17:30出發晚宴" },
                    { time: "18:30", type: "wedding", title: "Grand Banquet 晚宴", desc: "地點：The Myst Dong Khoi。邱邱應援！", nav: "https://www.google.com/maps/search/?api=1&query=The+Myst+Dong+Khoi" },
                    { time: "21:30", type: "wedding", title: "婚禮圓滿結束", desc: "為父老淚縱橫..." }
                ]
            },
            {
                date: "03/22 (日)", loc: "生活感採買與最後血拼",
                weather: { icon: "fa-sun", temp: "26-36°C" },
                events: [
                    { time: "11:00", type: "shop", title: "濱城市場 & 高島屋", desc: "採買伴手禮。殺價從 5 折砍起。", nav: "https://www.google.com/maps/search/?api=1&query=Ben+Thanh+Market" },
                    { time: "20:00", type: "drink", title: "Chill Skybar", desc: "西貢夜晚終點。敬這場傳奇旅程。", nav: "https://www.google.com/maps/search/?api=1&query=Chill+Skybar+Saigon" }
                ]
            },
            {
                date: "03/23 (一)", loc: "榮耀歸國：珍重再見",
                weather: { icon: "fa-cloud-sun", temp: "25-35°C" },
                events: [
                    { time: "08:30", type: "transport", title: "Grab 前往機場", desc: "長榮 CI 782 準時報到。" }
                ]
            }
        ],
        info: {
            hotels: [
                { 
                    name: "The Myst Dong Khoi (3/18 - 3/20 入住)", 
                    addr: "6-8 Hồ Huấn Nghiệp, Bến Nghé, Quận 1, Hồ Chí Minh", 
                    note: "第一郡中心，頂級精品飯店", 
                    nav: "https://www.google.com/maps/search/?api=1&query=The+Myst+Dong+Khoi" 
                },
                { 
                    name: "Holiday Inn & Suites Saigon Airport (3/21 - 3/22 入住)", 
                    addr: "18E Cộng Hòa, Phường 4, Tân Bình, Hồ Chí Minh", 
                    note: "3/21 迎娶基地，近機場便利", 
                    nav: "https://www.google.com/maps/search/?api=1&query=Holiday+Inn+Suites+Saigon+Airport" 
                },
                { 
                    name: "Edoya Hotel Ben Thanh (3/22 - 3/23 入住)", 
                    addr: "11-13 Lưu Văn Lang, Phường Bến Thành, Quận 1, Hồ Chí Minh", 
                    note: "最後一晚，包袱款款...", 
                    nav: "https://www.google.com/maps/search/?api=1&query=Edoya+Hotel+Ben+Thanh" 
                }
            ],
            flight: "✈️ 去：CI 783 (14:10) | ✈️ 回：CI 782 (11:00)"
        },
        guide: {
            essentials: [
                { title: "🚗 Grab 專業守則", val: "只選 GrabCar。下車確認沒掉手機。APP 綁好信用卡扣款，以免現金找零糾紛。" },
                { title: "🥖 美食雷區預警", val: "路邊攤冰塊若非圓孔狀(管型冰)，腸胃弱者請避免。河粉桌上的香菜建議先聞再加。" },
                { title: "🛡️ 街頭生存術", val: "在路邊拿手機看地圖時，務必背對街道內側。小心飛車黨搶手機。" }
            ]
        },
        luggage: [
            { category: "婚禮專區", items: ["帥就完事了", "帥","帥","帥", "帥","禮金紅包"] },
            { category: "日常必備", items: ["電子簽證列印本", "萬用轉接頭", "止瀉藥/胃藥", "防曬乳/太陽眼鏡", "3C充電"] }
        ]
    };

    function updateNav(idx) {
        document.querySelectorAll('.nav-btn').forEach((btn, i) => {
            btn.className = i === idx ? "nav-btn flex flex-col items-center justify-center w-1/4 h-full text-vn-red font-bold" : "nav-btn flex flex-col items-center justify-center w-1/4 h-full text-gray-400";
        });
    }

    function renderItinerary() {
        updateNav(0);
        const container = document.getElementById('main-content');
        container.innerHTML = tripData.days.map(day => `
            <div class="rounded-xl shadow-sm border ${day.isWedding ? 'wedding-mode' : 'bg-white border-slate-100'} overflow-hidden mb-6">
                <div class="${day.isWedding ? 'bg-wedding-pink text-white' : 'bg-slate-800 text-white'} px-4 py-2 flex justify-between items-center">
                    <div class="flex flex-col">
                        <h2 class="font-bold text-sm">${day.date} | ${day.loc}</h2>
                    </div>
                    <div class="flex items-center bg-white/20 px-2 py-1 rounded-lg text-[10px] font-bold">
                        <i class="fas ${day.weather.icon} mr-1"></i>
                        <span>${day.weather.temp}</span>
                    </div>
                </div>
                <div class="p-3">
                    ${day.events.map(e => `
                        <div class="relative pl-6 py-4 border-l border-slate-100 ml-4">
                            <div class="absolute -left-1.5 top-6 w-3 h-3 rounded-full bg-white border-2 ${day.isWedding ? 'border-wedding-pink' : 'border-vn-red'}"></div>
                            <div class="flex justify-between items-start text-sm">
                                <div class="flex-1">
                                    <span class="text-[10px] text-slate-400 font-mono">${e.time || ''}</span>
                                    <h3 class="font-bold block text-slate-800">${e.title}</h3>
                                    <p class="text-[11px] text-slate-500 mt-1 leading-relaxed">${e.desc}</p>
                                    ${e.pro ? `<div class="pro-tip"><i class="fas fa-lightbulb mr-1"></i>${e.pro}</div>` : ''}
                                </div>
                                ${e.nav ? `<a href="${e.nav}" target="_blank" class="ml-2 p-2 ${day.isWedding ? 'text-wedding-pink bg-pink-50' : 'text-grab-green bg-green-50'} rounded-full"><i class="fas fa-location-arrow text-sm"></i></a>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function renderInfo() {
        updateNav(1);
        const container = document.getElementById('main-content');
        container.innerHTML = `
            <div class="space-y-6">
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="font-bold border-b pb-2 mb-4 text-vn-red flex items-center"><i class="fas fa-map-marker-alt mr-2"></i> 戰略基地（飯店資訊）</h3>
                    <div class="space-y-4">
                        ${tripData.info.hotels.map(h => `
                            <div class="text-xs">
                                <div class="font-bold text-sm text-slate-800">${h.name}</div>
                                <div class="text-slate-500 my-1 font-medium">${h.addr}</div>
                                <div class="text-wedding-pink font-bold italic mb-2">📍 ${h.note}</div>
                                <a href="${h.nav}" target="_blank" class="text-blue-600 underline font-bold">開啟 Google Maps 導航</a>
                            </div>
                        `).join('<hr class="my-2">')}
                    </div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="font-bold border-b pb-2 mb-4 text-vn-red flex items-center"><i class="fas fa-plane mr-2"></i> 航班資訊</h3>
                    <div class="text-xs font-mono bg-slate-800 p-3 rounded text-gold">${tripData.info.flight}</div>
                </div>
            </div>`;
    }

    function renderGuide() {
        updateNav(2);
        const container = document.getElementById('main-content');
        container.innerHTML = `<div class="p-5 bg-white rounded-xl border border-slate-100"><h3 class="font-bold text-vn-red mb-4">義父團生存守則</h3>${tripData.guide.essentials.map(t => `<div class="mb-5"><div class="text-[11px] font-bold text-slate-700 border-l-4 border-gold pl-2">${t.title}</div><div class="text-xs text-slate-500 mt-2 leading-relaxed">${t.val}</div></div>`).join('')}</div>`;
    }

    function renderLuggage() {
        updateNav(3);
        const container = document.getElementById('main-content');
        container.innerHTML = `<div class="space-y-4">${tripData.luggage.map(cat => `<div class="bg-white p-5 rounded-xl border border-slate-100"><h3 class="font-bold text-vn-red text-sm mb-3">${cat.category}</h3><div class="grid grid-cols-2 gap-3">${cat.items.map(item => `<label class="flex items-center space-x-2 text-xs text-slate-600"><input type="checkbox" class="rounded border-gray-300 text-vn-red"><span>${item}</span></label>`).join('')}</div></div>`).join('')}</div>`;
    }

    document.addEventListener('DOMContentLoaded', renderItinerary);
</script>
</body>
</html>
